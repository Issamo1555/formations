<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartcodai | Verification du certificat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #05060A;
            --bg-panel: #0D101C;
            --bg-elevated: #11162A;
            --primary: #10b981;
            --secondary: #7c6df8;
            --text-main: #FFFFFF;
            --text-muted: rgba(226, 232, 240, 0.72);
            --border-light: rgba(255, 255, 255, 0.10);
            --ring: rgba(16, 185, 129, 0.30);
            --shadow-card: 0 16px 38px rgba(0, 0, 0, 0.36);
            --page-glow: radial-gradient(circle at 30% 20%, rgba(124, 109, 248, 0.14), transparent 40%),
                         radial-gradient(circle at 70% 80%, rgba(16, 185, 129, 0.10), transparent 40%);
        }

        body.light-mode {
            --bg-base: #f5f7fa;
            --bg-panel: #ffffff;
            --bg-elevated: #f8fafc;
            --text-main: #0b1324;
            --text-muted: rgba(15, 23, 42, 0.62);
            --border-light: rgba(15, 23, 42, 0.10);
            --shadow-card: 0 10px 28px rgba(2, 6, 23, 0.08);
            --page-glow: radial-gradient(circle at 30% 20%, rgba(124, 109, 248, 0.06), transparent 40%),
                         radial-gradient(circle at 70% 80%, rgba(16, 185, 129, 0.05), transparent 40%);
            color-scheme: light;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-base);
            background-image: var(--page-glow);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            transition: background-color 0.3s ease;
        }

        .verify-container {
            width: 100%;
            max-width: 560px;
        }

        .verify-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .verify-logo {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .verify-logo img { height: 36px; width: 36px; border-radius: 8px; }

        .verify-header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
        }

        .verify-header p {
            color: var(--text-muted);
            font-size: 0.92rem;
        }

        .verify-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 2rem 1.75rem;
            box-shadow: var(--shadow-card);
        }

        .search-form {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
        }

        .search-input {
            flex: 1;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            background: var(--bg-elevated);
            color: var(--text-main);
            font-size: 0.92rem;
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--ring);
        }

        .search-input::placeholder { color: var(--text-muted); opacity: 0.6; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), rgba(124, 109, 248, 0.95));
            color: #06151a;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.25);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-hover), rgba(124, 109, 248, 0.90));
            color: #fff;
            transform: translateY(-2px);
        }

        .result {
            display: none;
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-light);
            background: var(--bg-elevated);
        }

        .result.valid {
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.06);
        }

        .result.invalid {
            border-color: rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.06);
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .result-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .result.valid .result-icon {
            background: rgba(16, 185, 129, 0.15);
            color: var(--primary);
        }

        .result.invalid .result-icon {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .result-title {
            font-weight: 700;
            font-size: 1.05rem;
        }

        .result-subtitle {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .cert-details {
            display: grid;
            gap: 0.6rem;
        }

        .cert-detail {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.88rem;
        }

        .cert-detail:last-child { border-bottom: none; }

        .cert-detail .label {
            color: var(--text-muted);
            font-weight: 500;
        }

        .cert-detail .value {
            font-weight: 600;
            color: var(--text-main);
        }

        .share-section {
            margin-top: 1.25rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--border-light);
        }

        .share-title {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.75rem;
        }

        .share-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.55rem 0.85rem;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 600;
            border: 1px solid var(--border-light);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            font-family: inherit;
        }

        .share-btn:hover {
            transform: translateY(-2px);
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.08);
        }

        .share-btn.linkedin {
            background: rgba(0, 119, 181, 0.12);
            border-color: rgba(0, 119, 181, 0.3);
            color: #0077b5;
        }

        body.light-mode .share-btn.linkedin { color: #0077b5; }

        .share-btn.linkedin:hover {
            background: rgba(0, 119, 181, 0.20);
        }

        .icon {
            width: 16px;
            height: 16px;
            display: inline-block;
        }

        .theme-toggle {
            position: fixed;
            top: 1.25rem;
            right: 1.25rem;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            background: var(--bg-panel);
            color: var(--text-main);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.2s ease;
        }

        .back-link a:hover { opacity: 0.8; }

        @media (max-width: 480px) {
            .verify-card { padding: 1.5rem 1.25rem; }
            .search-form { flex-direction: column; }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Basculer le theme">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12Zm0-14a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0V5a1 1 0 0 1 1-1Zm0 16a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0v-1a1 1 0 0 1 1-1Zm10-9a1 1 0 0 1-1 1h-1a1 1 0 1 1 0-2h1a1 1 0 0 1 1 1ZM4 12a1 1 0 0 1-1 1H2a1 1 0 1 1 0-2h1a1 1 0 0 1 1 1Zm15.1-7.1a1 1 0 0 1 0 1.4l-.7.7a1 1 0 1 1-1.4-1.4l.7-.7a1 1 0 0 1 1.4 0ZM6 18a1 1 0 0 1 0 1.4l-.7.7a1 1 0 1 1-1.4-1.4l.7-.7A1 1 0 0 1 6 18Zm12.4 2.1a1 1 0 0 1-1.4 0l-.7-.7a1 1 0 1 1 1.4-1.4l.7.7a1 1 0 0 1 0 1.4ZM6.7 7.1a1 1 0 0 1-1.4 0l-.7-.7A1 1 0 0 1 6 5l.7.7a1 1 0 0 1 0 1.4Z"/>
        </svg>
    </button>

    <div class="verify-container">
        <div class="verify-header">
            <div class="verify-logo">
                <img src="assets/logo.png" alt="Logo">
                Smartcodai
            </div>
            <h1>Verification du certificat</h1>
            <p>Entrez l'identifiant du certificat pour verifier son authenticite</p>
        </div>

        <div class="verify-card">
            <form class="search-form" id="verifyForm">
                <input class="search-input" type="text" id="certIdInput" placeholder="Ex: PHP-2026-12345" required>
                <button type="submit" class="btn btn-primary">Verifier</button>
            </form>

            <div class="result" id="result">
                <div class="result-header">
                    <div class="result-icon" id="resultIcon">
                        <svg class="icon" viewBox="0 0 24 24" fill="currentColor" id="resultIconSvg"></svg>
                    </div>
                    <div>
                        <div class="result-title" id="resultTitle"></div>
                        <div class="result-subtitle" id="resultSubtitle"></div>
                    </div>
                </div>

                <div class="cert-details" id="certDetails"></div>

                <div class="share-section" id="shareSection" style="display:none;">
                    <div class="share-title">Partager ce certificat</div>
                    <div class="share-buttons">
                        <a class="share-btn linkedin" id="shareLinkedin" target="_blank" rel="noopener">
                            <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M20.4 20.5h-3.6v-5.6c0-1.3 0-3-1.8-3s-2.1 1.4-2.1 2.9v5.7H9.3V9h3.5v1.6h.1c.5-.9 1.7-1.9 3.5-1.9 3.7 0 4.4 2.5 4.4 5.7v6.1ZM5.3 7.4a2.1 2.1 0 1 1 0-4.2 2.1 2.1 0 0 1 0 4.2ZM7.1 20.5H3.5V9h3.6v11.5ZM22.2 2H1.8C.8 2 0 2.8 0 3.8v16.4c0 1 .8 1.8 1.8 1.8h20.4c1 0 1.8-.8 1.8-1.8V3.8c0-1-.8-1.8-1.8-1.8Z"/>
                            </svg>
                            LinkedIn
                        </a>
                        <button class="share-btn" id="shareCopy" type="button">
                            <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M7 4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-1V6a3 3 0 0 0-3-3H7V4ZM4 8a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8Zm2 0v12h9V8H6Z"/>
                            </svg>
                            Copier le lien
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="back-link">
            <a href="index.html">Retour a l'accueil</a>
        </div>
    </div>

    <script>
        const THEME_KEY = 'smartcodai-theme';
        const themeToggle = document.getElementById('themeToggle');

        function applyTheme(theme) {
            document.body.classList.toggle('light-mode', theme === 'light');
            themeToggle.innerHTML = theme === 'light'
                ? '<svg class="icon" viewBox="0 0 24 24"><path fill="currentColor" d="M21 14.2A7.6 7.6 0 0 1 11.8 3a1 1 0 0 0-1.1 1.5 6.1 6.1 0 0 0 7.8 9.1 1 1 0 0 0 1.5 1.1Z"/></svg>'
                : '<svg class="icon" viewBox="0 0 24 24"><path fill="currentColor" d="M12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12Zm0-14a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0V5a1 1 0 0 1 1-1Zm0 16a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0v-1a1 1 0 0 1 1-1Zm10-9a1 1 0 0 1-1 1h-1a1 1 0 1 1 0-2h1a1 1 0 0 1 1 1ZM4 12a1 1 0 0 1-1 1H2a1 1 0 1 1 0-2h1a1 1 0 0 1 1 1Zm15.1-7.1a1 1 0 0 1 0 1.4l-.7.7a1 1 0 1 1-1.4-1.4l.7-.7a1 1 0 0 1 1.4 0ZM6 18a1 1 0 0 1 0 1.4l-.7.7a1 1 0 1 1-1.4-1.4l.7-.7A1 1 0 0 1 6 18Zm12.4 2.1a1 1 0 0 1-1.4 0l-.7-.7a1 1 0 1 1 1.4-1.4l.7.7a1 1 0 0 1 0 1.4ZM6.7 7.1a1 1 0 0 1-1.4 0l-.7-.7A1 1 0 0 1 6 5l.7.7a1 1 0 0 1 0 1.4Z"/></svg>';
        }
        applyTheme(localStorage.getItem(THEME_KEY) || 'dark');
        themeToggle.addEventListener('click', () => {
            const next = document.body.classList.contains('light-mode') ? 'dark' : 'light';
            localStorage.setItem(THEME_KEY, next);
            applyTheme(next);
        });

        // Certificate registry (stored in localStorage by course pages)
        const CERT_REGISTRY_KEY = 'smartcodai_certificates';

        function getCertificate(certId) {
            try {
                const certs = JSON.parse(localStorage.getItem(CERT_REGISTRY_KEY)) || [];
                return certs.find(c => c.id === certId) || null;
            } catch { return null; }
        }

        // Check URL param on load
        const urlParams = new URLSearchParams(window.location.search);
        const urlCertId = urlParams.get('cert');
        if (urlCertId) {
            document.getElementById('certIdInput').value = urlCertId;
            verifyCertificate(urlCertId);
        }

        // Form submission
        document.getElementById('verifyForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const certId = document.getElementById('certIdInput').value.trim();
            verifyCertificate(certId);
        });

        function verifyCertificate(certId) {
            const result = document.getElementById('result');
            const details = document.getElementById('certDetails');
            const shareSection = document.getElementById('shareSection');

            if (!certId) return;

            const cert = getCertificate(certId);

            if (cert) {
                result.className = 'result valid';
                document.getElementById('resultIconSvg').innerHTML = '<path d="M9 16.2 5.8 13a1 1 0 1 0-1.4 1.4l4 4a1 1 0 0 0 1.4 0l10-10a1 1 0 1 0-1.4-1.4L9 16.2Z"/>';
                document.getElementById('resultTitle').textContent = 'Certificat authentique';
                document.getElementById('resultSubtitle').textContent = 'Ce certificat a ete emis par Smartcodai Academy et est valide.';

                const courseNames = {
                    'php': 'Developpement Web Backend avec PHP',
                    'python': 'Programmation en Python',
                    'n8n': 'Automatisation avec n8n',
                    'openclaw': 'Maîtrise de l\'IA OpenClaw'
                };

                details.innerHTML = `
                    <div class="cert-detail">
                        <span class="label">Etudiant</span>
                        <span class="value">${escapeHtml(cert.studentName)}</span>
                    </div>
                    <div class="cert-detail">
                        <span class="label">Formation</span>
                        <span class="value">${courseNames[cert.course] || cert.course}</span>
                    </div>
                    <div class="cert-detail">
                        <span class="label">Reference</span>
                        <span class="value" style="font-family:monospace;">${escapeHtml(cert.id)}</span>
                    </div>
                    <div class="cert-detail">
                        <span class="label">Date d'emission</span>
                        <span class="value">${cert.date}</span>
                    </div>
                    <div class="cert-detail">
                        <span class="label">Score</span>
                        <span class="value">${cert.score}%</span>
                    </div>
                `;

                // Build share URL
                const verifyUrl = window.location.origin + window.location.pathname + '?cert=' + encodeURIComponent(certId);
                const shareText = `Je viens d'obtenir mon certificat "${courseNames[cert.course] || cert.course}" sur Smartcodai Academy ! Reference: ${cert.id}`;

                // LinkedIn share URL
                const linkedinUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(verifyUrl)}`;
                document.getElementById('shareLinkedin').href = linkedinUrl;

                // Copy link button
                document.getElementById('shareCopy').onclick = () => {
                    navigator.clipboard.writeText(verifyUrl).then(() => {
                        const btn = document.getElementById('shareCopy');
                        btn.innerHTML = `<svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.2 5.8 13a1 1 0 1 0-1.4 1.4l4 4a1 1 0 0 0 1.4 0l10-10a1 1 0 1 0-1.4-1.4L9 16.2Z"/></svg> Copie !`;
                        setTimeout(() => {
                            btn.innerHTML = `<svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M7 4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-1V6a3 3 0 0 0-3-3H7V4ZM4 8a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8Zm2 0v12h9V8H6Z"/></svg> Copier le lien`;
                        }, 2000);
                    });
                };

                shareSection.style.display = '';
            } else {
                result.className = 'result invalid';
                document.getElementById('resultIconSvg').innerHTML = '<path d="M12 2a10 10 0 1 1 0 20 10 10 0 0 1 0-20Zm3.3 12.7a1 1 0 1 1-1.4-1.4L12.7 12l1.3-1.3a1 1 0 1 1-1.4-1.4L11.3 10.6 10 9.3a1 1 0 1 1 1.4-1.4L12.7 9.2l1.3-1.3a1 1 0 1 1 1.4 1.4L14.1 10.6l1.3 1.3a1 1 0 1 1-1.4 1.4L12.7 12Z"/>';
                document.getElementById('resultTitle').textContent = 'Certificat introuvable';
                document.getElementById('resultSubtitle').textContent = 'Aucun certificat ne correspond a cette reference. Verifiez l\'identifiant ou contactez Smartcodai.';
                details.innerHTML = '';
                shareSection.style.display = 'none';
            }

            result.style.display = '';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
