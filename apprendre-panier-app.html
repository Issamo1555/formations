      <div class="lesson-body">

          <h1 style="color: var(--php);">🛒 Système de Panier d'Achat PHP</h1>
          <p><strong style="color: var(--accent);">Niveau:</strong> Intermédiaire</p>
          <p><strong style="color: var(--accent);">Objectif:</strong> Créer un système complet de e-commerce avec panier persistant</p>
          <hr style="border-color: var(--border);">
          <h2 style="color: var(--php);">📋 Liste des fichiers à créer</h2>
          <ol style="color: var(--text);">
            <li><strong>catalogue.php</strong> - Affichage des produits</li>
            <li><strong>ajouter_panier.php</strong> - Ajout d'articles au panier</li>
            <li><strong>panier.php</strong> - Affichage et gestion du panier</li>
            <li><strong>supprimer_panier.php</strong> - Suppression d'articles</li>
            <li><strong>valider_commande.php</strong> - Finalisation de la commande</li>
          </ol>
          <h3 style="color: var(--php2);">Concepts appris:</h3>
          <ul style="color: var(--text);">
            <li>Manipulation avancée des tableaux</li>
            <li>Utilisation des sessions pour la persistance</li>
            <li>Calculs et opérations mathématiques</li>
            <li>Gestion des quantités et stocks</li>
            <li>Redirections et flux utilisateur</li>
          </ul>
        </div>
        <div id="panier-catalogue" class="tab-panel">
          <h2 style="color: var(--php);">📦 Catalogue de Produits</h2>
          <p><strong style="color: var(--accent);">Description:</strong> Page d'accueil affichant tous les produits disponibles avec possibilité d'ajout au panier.</p>
          <div class="code-block">
            <div class="code-header">
              <span class="code-lang">PHP</span>
            </div>
            <pre style="color: var(--text);">&lt;?php

 */

    [

        "prix" => 49.99,
        "stock" => 12,
        "description" => "Souris gaming RGB avec 7 boutons programmables"

    [
        "id" => 3,
        "nom" => "Clavier Mécanique",
        "prix" => 129.99,
        "stock" => 8,
        "description" => "Clavier mécanique avec switches bleus"
    ]
];
?&gt;

&lt;!DOCTYPE html&gt;
&lt;html lang="fr"&gt;
&lt;head&gt;
    &lt;meta charset="UTF-8"&gt;
    &lt;title&gt;Catalogue - Boutique PHP&lt;/title&gt;
    &lt;style&gt;
        .produit { border: 1px solid #ddd; padding: 15px; margin: 10px; }
        .prix { color: green; font-weight: bold; }

    &lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
    &lt;h1&gt;🛍️ Notre Catalogue&lt;/h1&gt;
    
    &lt;!-- Affichage du nombre d'articles dans le panier --&gt;

        &lt;a href="panier.php"&gt;🛒 Panier&lt;/a&gt;

    &lt;/p&gt;

            &lt;p&gt;&lt;?php echo $produit['description']; ?&gt;&lt;/p&gt;

            &lt;form action="ajouter_panier.php" method="POST"&gt;
                &lt;input type="hidden" name="id_produit" value="&lt;?php echo $produit['id']; ?&gt;"&gt;
                &lt;label&gt;Quantité: &lt;/label&gt;
                &lt;input type="number" name="quantite" value="1" min="1" max="&lt;?php echo $produit['stock']; ?&gt;"&gt;
                &lt;button type="submit"&gt;Ajouter au panier&lt;/button&gt;
            &lt;/form&gt;

/**
 * FICHIER: ajouter_panier.php
 * ROLE: Ajouter un produit au panier
 */

session_start();

// ============================================
// VÉRIFICATION DES DONNÉES
// ============================================
if (!isset($_POST['id_produit']) || !isset($_POST['quantite'])) {
    header("Location: catalogue.php");
    exit();
}

$id_produit = (int)$_POST['id_produit'];
$quantite = (int)$_POST['quantite'];

// ============================================
// INITIALISER LE PANIER SI NÉCESSAIRE
// ============================================
if (!isset($_SESSION['panier'])) {
    $_SESSION['panier'] = [];
}

// ============================================
// AJOUTER OU METTRE À JOUR LE PRODUIT
// ============================================
if (isset($_SESSION['panier'][$id_produit])) {
    // Le produit existe déjà, on ajoute la quantité
    $_SESSION['panier'][$id_produit] += $quantite;
} else {
    // Nouveau produit dans le panier
    $_SESSION['panier'][$id_produit] = $quantite;
}

// ============================================
// REDIRECTION VERS LE CATALOGUE
// ============================================
header("Location: catalogue.php?message=Produit ajouté au panier");
exit();
?&gt;</pre>

/**
 * FICHIER: panier.php

 */

// Catalogue des produits (même que catalogue.php)

    2 => ["nom" => "Souris Gaming", "prix" => 49.99, "stock" => 12],

];

$total = 0;
?&gt;

&lt;!DOCTYPE html&gt;
&lt;html lang="fr"&gt;
&lt;head&gt;

&lt;/head&gt;

    &lt;?php else: ?&gt;

                &lt;th&gt;Prix unitaire&lt;/th&gt;

            &lt;/tr&gt;
            
            &lt;?php foreach ($_SESSION['panier'] as $id => $quantite): ?&gt;

                $sous_total = $produit['prix'] * $quantite;
                $total += $sous_total;
                ?&gt;

                    &lt;td&gt;&lt;?php echo $produit['nom']; ?&gt;&lt;/td&gt;

                    &lt;td&gt;&lt;?php echo $quantite; ?&gt;&lt;/td&gt;
                    &lt;td&gt;&lt;?php echo number_format($sous_total, 2); ?&gt; €&lt;/td&gt;
                    &lt;td&gt;
                        &lt;a href="supprimer_panier.php?id=&lt;?php echo $id; ?&gt;"&gt;Supprimer&lt;/a&gt;
                    &lt;/td&gt;
                &lt;/tr&gt;
            &lt;?php endforeach; ?&gt;

// Tab switching function
function switchPanierTab(tabName, btn = null) {
  // Update sidebar active state
  document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
  const sidebarItems = {
    'intro': 0,
    'catalogue': 1,
    'panier': 2,
    'session': 3,
    'commande': 4,
    'exercices': 5,
    'skills-ai': 6
  };
  if (sidebarItems[tabName] !== undefined) {
    document.querySelectorAll('.sidebar-item')[sidebarItems[tabName]].classList.add('active');
  }

  // Update tab buttons
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  // Show selected tab
  document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
  const targetPanel = document.getElementById('panier-' + tabName);
  if (targetPanel) targetPanel.classList.add('active');
}
