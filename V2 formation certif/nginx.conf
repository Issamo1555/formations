user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    # Gzip compression
    gzip  on;
    gzip_vary  on;
    gzip_proxied  any;
    gzip_comp_level  6;
    gzip_types  text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Taille maximale des requêtes (uploads)
    client_max_body_size  10M;

    # Rate limiting
    limit_req_zone  $binary_remote_addr  zone=api:10m  rate=30r/s;

    # ─── Upstream vers l'app Next.js ───
    upstream smartcodai {
        server app:3000;
        keepalive 32;
    }

    # ─── HTTP (redirect vers HTTPS si SSL activé) ───
    server {
        listen  80;
        server_name  _;

        # ACME challenge pour Certbot
        location /.well-known/acme-challenge/ {
            root  /var/www/certbot;
        }

        location / {
            # Si vous n'avez pas encore de SSL, supprimez ce redirect
            # return  301  https://$host$request_uri;
            proxy_pass  http://smartcodai;
            proxy_http_version  1.1;
            proxy_set_header  Upgrade  $http_upgrade;
            proxy_set_header  Connection  'upgrade';
            proxy_set_header  Host  $host;
            proxy_set_header  X-Real-IP  $remote_addr;
            proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto  $scheme;
            proxy_cache_bypass  $http_upgrade;
            proxy_cookie_path / "/; HTTPOnly; SameSite=Lax";
        }
    }

    # ─── HTTPS (décommentez quand vous avez un domaine + certificats) ───
    # server {
    #     listen  443  ssl;
    #     server_name  votre-domaine.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/votre-domaine.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/votre-domaine.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers  on;
    #
    #     location / {
    #         proxy_pass  http://smartcodai;
    #         proxy_http_version  1.1;
    #         proxy_set_header  Upgrade  $http_upgrade;
    #         proxy_set_header  Connection  'upgrade';
    #         proxy_set_header  Host  $host;
