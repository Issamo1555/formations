# ============================================================
# Configuration Nginx — Smartcodai V2 (edu.smartcodai.com)
# À ajouter dans : /etc/nginx/sites-available/edu.smartcodai.com
# Sur le VPS Hostinger (62.72.19.56)
#
# Prérequis : l'app tourne sur le port 3004 (docker compose up -d)
# ============================================================

# ─── Redirection HTTP → HTTPS ───
server {
    listen 80;
    server_name edu.smartcodai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Serveur HTTPS ───
server {
    listen 443 ssl;
    server_name edu.smartcodai.com;

    # Certificats SSL (générés par Certbot)
    ssl_certificate     /etc/letsencrypt/live/edu.smartcodai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edu.smartcodai.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Proxy vers l'app Next.js ───
    location / {
        proxy_pass         http://localhost:3004;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ─── Optimisations ───
    client_max_body_size 10M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
