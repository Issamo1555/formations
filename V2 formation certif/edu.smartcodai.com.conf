server {
    server_name edu.smartcodai.com;

    location / {
        proxy_pass http://localhost:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/edu.smartcodai.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/edu.smartcodai.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = edu.smartcodai.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name edu.smartcodai.com;
    return 404; # managed by Certbot


}