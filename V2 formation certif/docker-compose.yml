# ============================================================
# Smartcodai V2 — Docker Compose (Multi-Sites VPS Compatible)
# ============================================================
# ⚠️  Ce projet cohabite avec MamaCare, POSetRDV, etc.
#     Le Nginx GLOBAL du VPS gère le SSL et le reverse-proxy.
#     NE PAS inclure de service nginx ou certbot ici.
#
# Port exposé : 3002 (interne : 3000)
# Nginx global doit faire proxy_pass → http://localhost:3002
#
# Usage:
#   docker compose up -d          # Démarrer
#   docker compose logs -f app    # Voir les logs
#   docker compose down           # Arrêter
# ============================================================

services:

  # ─── Base de données PostgreSQL ───
  postgres:
    image: postgres:17-alpine
    container_name: ${DB_CONTAINER_NAME:-smartcodai-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartcodai_v2
      POSTGRES_USER: smartcodai
      POSTGRES_PASSWORD: "Smartcodai2026"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartcodai-net
    # PostgreSQL exposé uniquement sur le localhost du VPS pour le tunnel SSH
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U smartcodai -d smartcodai_v2" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application Next.js ───
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_CONTAINER_NAME:-smartcodai-app}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=postgresql://smartcodai:Smartcodai2026@postgres:5432/smartcodai_v2
      - NODE_ENV=production
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-to-a-random-string}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://certif.smartcodai.com}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartcodai-net
    ports:
      - "${APP_PORT:-3002}:3000"   # ← Port configurable, pas de conflit avec les autres apps
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/public/uploads
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M

# ─── Réseau isolé (aucun conflit avec MamaCare / POSetRDV) ───
networks:
  smartcodai-net:
    driver: bridge

# ─── Volumes persistants ───
volumes:
  postgres_data:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local
