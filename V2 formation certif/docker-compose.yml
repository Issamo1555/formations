version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: smartcodai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartcodai_v2
      POSTGRES_USER: smartcodai
      POSTGRES_PASSWORD: "Smartcodai2026"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
